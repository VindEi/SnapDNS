name: snapdns
description: "High-performance DNS resolver."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.1
  window_manager: ^0.5.1
  win32: ^6.3.0 # Required by FilePicker 12
  ffi: ^2.1.2
  path_provider: ^2.1.3
  system_tray: ^2.0.3
  path: ^1.9.0
  flutter_svg: ^2.0.10+1
  url_launcher: ^6.3.0
  file_picker: ^12.0.0-beta.5 # Required for Gradle 9.1.0 compatibility
  uuid: ^3.0.7
  flutter_v2ray: ^1.0.10 # ADD THIS
  flutter_launcher_icons: ^0.13.1 # ADD THIS LINE

dev_dependencies:
  # flutter_test:
  #  sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true # THIS FIXES THE SQUARES

  assets:
    - assets/SnapDns.svg
    - assets/SnapDns.ico

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/SnapDns.png" # Path to a high-res PNG version
  windows:
    generate: true
    image_path: "assets/SnapDns.png"
    icon_size: 256
  macos:
    generate: true
    image_path: "assets/SnapDns.png"
  linux:
    generate: true
    image_path: "assets/SnapDns.png"
