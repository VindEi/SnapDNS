name: snapdns
description: "High-performance DNS resolver."
publish_to: "none"
version: 2.0.0

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.1
  window_manager: ^0.5.1
  win32: ^6.3.0 
  ffi: ^2.1.2
  path_provider: ^2.1.3
  system_tray: ^2.0.3
  path: ^1.9.0
  flutter_svg: ^2.0.10+1
  url_launcher: ^6.3.0
  file_picker: ^12.0.0-beta.5 
  uuid: ^3.0.7
  flutter_v2ray: ^1.0.10 
  flutter_launcher_icons: ^0.13.1 
  http: ^1.6.0
  image: ^4.8.0 

dev_dependencies:
  # flutter_test:
  #  sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true 

  assets:
    - assets/SnapDns.svg
    - assets/SnapDns.ico

flutter_launcher_icons:
  android: true
  ios: true
