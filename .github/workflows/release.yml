name: Build & Release SnapDNS

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-android-linux:
    name: Build Android & Linux
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.x"
          channel: "stable"

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Install Linux Build Dependencies
        run: |
          sudo apt-get update -y
          # FIX: Added 'libayatana-appindicator3-dev' to the native build dependencies to permit the system_tray C++ compile step
          sudo apt-get install -y clang cmake git ninja-build pkg-config libgtk-3-dev libayatana-appindicator3-dev

      - name: Build Android APKs
        working-directory: ./SnapDns_UI
        run: |
          flutter build apk --release --split-per-abi --build-name 2.0.0 --build-number 1
          mv build/app/outputs/flutter-apk/app-arm64-v8a-release.apk ../SnapDNS_Android_arm64.apk
          mv build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk ../SnapDNS_Android_arm32.apk
          mv build/app/outputs/flutter-apk/app-x86_64-release.apk ../SnapDNS_Android_x86_64.apk

      - name: Build Linux Flutter UI
        working-directory: ./SnapDns_UI
        run: flutter build linux --release --build-name 2.0.0 --build-number 1

      - name: Build Linux C# Service
        working-directory: ./SnapDns_Service
        run: dotnet publish SnapDns.Service.csproj -c Release -r linux-x64 --self-contained true -p:PublishSingleFile=true -p:PublishTrimmed=true

      - name: Package Linux Bundle
        run: |
          mkdir SnapDNS_Linux_x64
          cp -r SnapDns_UI/build/linux/x64/release/bundle/* SnapDNS_Linux_x64/
          cp SnapDns_Service/bin/Release/net10.0/linux-x64/publish/SnapDnsService SnapDNS_Linux_x64/
          cp scripts/install_linux.sh SnapDNS_Linux_x64/
          zip -r SnapDNS_Linux_x64.zip SnapDNS_Linux_x64/

      - name: Upload Artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: |
            SnapDNS_Android_arm64.apk
            SnapDNS_Android_arm32.apk
            SnapDNS_Android_x86_64.apk
            SnapDNS_Linux_x64.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.x"
          channel: "stable"

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Build macOS Flutter UI
        working-directory: ./SnapDns_UI
        run: flutter build macos --release --build-name 2.0.0 --build-number 1

      - name: Build macOS C# Service
        working-directory: ./SnapDns_Service
        run: dotnet publish SnapDns.Service.csproj -c Release -r osx-arm64 --self-contained true -p:PublishSingleFile=true -p:PublishTrimmed=true

      - name: Package macOS Bundle
        run: |
          mkdir SnapDNS_macOS_arm64
          cp -r SnapDns_UI/build/macos/Build/Products/Release/SnapDns.app SnapDNS_macOS_arm64/
          cp SnapDns_Service/bin/Release/net10.0/osx-arm64/publish/SnapDnsService SnapDNS_macOS_arm64/
          cp scripts/install_mac.command SnapDNS_macOS_arm64/
          zip -r SnapDNS_macOS_arm64.zip SnapDNS_macOS_arm64/

      - name: Upload Artifact
        uses: softprops/action-gh-release@v2
        with:
          files: SnapDNS_macOS_arm64.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-windows:
    name: Build Windows Portable
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.x"
          channel: "stable"

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Build Windows Flutter UI
        working-directory: .\SnapDns_UI
        run: flutter build windows --release --build-name 2.0.0 --build-number 1

      - name: Build Windows C# Service
        working-directory: .\SnapDns_Service
        run: dotnet publish SnapDns.Service.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:PublishTrimmed=true

      - name: Package Windows Portable Bundle
        run: |
          mkdir SnapDNS_Windows_x64_Portable
          xcopy /E /I "SnapDns_UI\build\windows\x64\runner\Release\*" "SnapDNS_Windows_x64_Portable\"
          copy "SnapDns_Service\bin\Release\net10.0\win-x64\publish\SnapDnsService.exe" "SnapDNS_Windows_x64_Portable\"
          copy "scripts\install_windows.bat" "SnapDNS_Windows_x64_Portable\"
          Compress-Archive -Path "SnapDNS_Windows_x64_Portable\*" -DestinationPath "SnapDNS_Windows_x64_Portable.zip"

      - name: Upload Artifact
        uses: softprops/action-gh-release@v2
        with:
          files: SnapDNS_Windows_x64_Portable.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
